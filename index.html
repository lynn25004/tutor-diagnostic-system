<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家教診斷系統</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./smart-system.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Tutor Diagnostic System</p>
          <h1>家教診斷系統</h1>
          <p>老師端負責建立測驗、分析報告、學生檔案與教材生成；學生端只負責作答。</p>
        </div>
        <div class="summary-grid">
          <div>
            <span>老師端</span>
            <strong>報告、檔案、教材</strong>
          </div>
          <div>
            <span>學生端</span>
            <strong>專心作答</strong>
          </div>
          <div>
            <span>題庫</span>
            <strong>年級、目標、趨勢</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Choose View</p>
            <h2>選擇使用版面</h2>
          </div>
        </div>
        <div class="button-row">
          <a class="primary-btn" href="./teacher.html">進入老師工作台</a>
          <a class="ghost-btn" href="./student.html">進入學生作答頁</a>
        </div>
      </section>
    </main>
  </body>
</html>
