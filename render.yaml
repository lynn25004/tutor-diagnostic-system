services:
  - type: web
    name: tutor-diagnostic-system
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
