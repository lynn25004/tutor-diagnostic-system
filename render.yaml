services:
  - type: web
    name: tutor-diagnostic-system
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: tutor-diagnostic-data
      mountPath: /var/data
      sizeGB: 1
